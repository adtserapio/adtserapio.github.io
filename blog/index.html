<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adrian Serapio | Blog</title>
  <meta name="description" content="Essays by Adrian Serapio." />
  <link rel="canonical" href="https://adtserapio.github.io/blog/" />
  <link rel="icon" type="image/png" href="../favicon.png?v=4" />
  <link rel="apple-touch-icon" href="../favicon.png?v=4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono:wght@400;500;550;600;700&family=Manrope:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="blog.css?v=3" />
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <i class="fa-solid fa-moon" id="theme-icon"></i>
  </button>
  <div class="page">
    <header>
      <p class="site-title">Adrian Serapio</p>
      <nav class="nav" aria-label="Blog navigation">
        <a class="home-link" href="../index.html" aria-label="Home">
          <i class="fa-solid fa-house" aria-hidden="true"></i>
        </a>
      </nav>
    </header>

    <main>
      <h1>Essays</h1>
      <p>Notes on Natural Language Processing, Artificial Intelligence, and Medicine</p>

      <ul class="essay-list">
        <li>
          <a href="context.html">// WIP: Context</a>
          <span class="essay-date">June 2026</span>
        </li>
      </ul>
    </main>

    <footer style="user-select:none;">
      © 2026 Adrian Serapio
    </footer>
  </div>

  <script>
    (function() {
      var toggle = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      var mq = window.matchMedia('(prefers-color-scheme: dark)');

      function isDark() {
        var theme = document.documentElement.getAttribute('data-theme');
        if (theme) return theme === 'dark';
        return mq.matches;
      }

      function apply() {
        var dark = isDark();
        document.body.style.background = dark ? '#0d1117' : '#ffffff';
        icon.className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      }

      toggle.addEventListener('click', function() {
        var dark = isDark();
        document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
        apply();
      });

      mq.addEventListener('change', function() {
        if (!document.documentElement.getAttribute('data-theme')) apply();
      });

      apply();
    })();
  </script>
</body>
</html>
